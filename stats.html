<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>测评统计后台</title>
  <style>
    :root {
      --ink: #18212b;
      --muted: #667085;
      --soft: #eef3f8;
      --line: #d8dee8;
      --paper: #fff;
      --wash: #f5f7fb;
      --blue: #3157d5;
      --teal: #0f9f8f;
      --orange: #d9822b;
      --rose: #c95464;
      --green: #2e9d66;
      --violet: #6d5bd0;
      --shadow: 0 18px 48px rgba(29, 41, 57, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .92) 0 18%, transparent 18% 100%),
        linear-gradient(90deg, rgba(49, 87, 213, .05) 1px, transparent 1px),
        linear-gradient(0deg, rgba(15, 159, 143, .05) 1px, transparent 1px),
        var(--wash);
      background-size: 34px 34px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.5;
    }

    button {
      font: inherit;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 54px;
    }

    .hero,
    .section,
    .metric,
    .distribution-card,
    .question,
    .text-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 34px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 7px;
      background: linear-gradient(90deg, var(--blue), var(--teal), var(--orange), var(--rose));
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      max-width: 820px;
      margin-top: 14px;
      color: #344054;
      font-size: 17px;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 26px;
    }

    .button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      color: #fff;
      background: var(--blue);
      font-weight: 900;
      cursor: pointer;
    }

    .status {
      color: var(--muted);
      font-weight: 800;
      font-size: 14px;
    }

    .status.error {
      color: var(--rose);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .metric {
      padding: 22px;
    }

    .metric strong {
      display: block;
      color: var(--blue);
      font-size: clamp(36px, 7vw, 72px);
      line-height: .95;
      letter-spacing: 0;
    }

    .metric span {
      display: block;
      margin-top: 9px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      margin-top: 18px;
    }

    .section {
      padding: 24px;
    }

    .section h2 {
      font-size: 24px;
      line-height: 1.2;
    }

    .subhead {
      margin-top: 6px;
      color: var(--muted);
      font-weight: 800;
    }

    .distribution-list,
    .question-list,
    .text-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .distribution-card {
      padding: 16px;
      box-shadow: none;
    }

    .card-title {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      color: var(--ink);
      font-weight: 950;
    }

    .card-title span:last-child {
      color: var(--muted);
      white-space: nowrap;
    }

    .bar-track {
      overflow: hidden;
      height: 11px;
      margin-top: 10px;
      border-radius: 999px;
      background: var(--soft);
    }

    .bar-fill {
      height: 100%;
      min-width: 3px;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--teal));
    }

    .bar-fill.role {
      background: linear-gradient(90deg, var(--blue), var(--teal));
    }

    .bar-fill.persona {
      background: linear-gradient(90deg, var(--violet), var(--blue));
    }

    .bar-fill.feasibility {
      background: linear-gradient(90deg, var(--teal), var(--green));
    }

    .bar-fill.question-bar {
      background: linear-gradient(90deg, var(--orange), var(--rose));
    }

    .questions {
      margin-top: 18px;
    }

    .question {
      padding: 18px;
      box-shadow: none;
    }

    .question-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .question-number {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--ink);
      font-weight: 950;
    }

    .question h3 {
      font-size: 18px;
      line-height: 1.35;
    }

    .question-total {
      color: var(--muted);
      font-weight: 900;
      white-space: nowrap;
    }

    .option-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 82px;
      gap: 14px;
      align-items: center;
      margin-top: 12px;
    }

    .option-label {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      margin-bottom: 6px;
      color: #344054;
      font-weight: 850;
    }

    .option-count {
      color: var(--muted);
      font-weight: 900;
      text-align: right;
      white-space: nowrap;
    }

    .text-card {
      padding: 16px;
      box-shadow: none;
    }

    .text-card p {
      color: #344054;
      font-weight: 750;
      word-break: break-word;
    }

    .text-card time {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .empty {
      margin-top: 16px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      font-weight: 850;
      background: rgba(255, 255, 255, .7);
    }

    @media (max-width: 860px) {
      .hero,
      .section {
        padding: 24px 18px;
      }

      .metrics,
      .grid {
        grid-template-columns: 1fr;
      }

      .question-head {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .question-total {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>测评统计后台</h1>
      <p class="lead">这里只展示完成测评后的汇总数据：完成总数、每道题的选项分布、自由输入题文本，以及主推岗位、职场人格和 AI 产品可行性分层。</p>
      <div class="toolbar">
        <button class="button" type="button" id="refreshBtn">刷新看板</button>
        <span class="status" id="statusText">正在读取...</span>
      </div>
    </section>

    <section class="metrics" aria-label="核心指标">
      <div class="metric">
        <strong id="completionCount">0</strong>
        <span>完成测评总数</span>
      </div>
      <div class="metric">
        <strong id="textCount">0</strong>
        <span>自由输入填写数</span>
      </div>
      <div class="metric">
        <strong id="questionCount">0</strong>
        <span>已有统计题目数</span>
      </div>
    </section>

    <section class="grid">
      <div class="section">
        <h2>最终结果数量</h2>
        <p class="subhead">主推岗位、职场人格、AI 产品可行性三类分布。</p>
        <div class="distribution-list" id="roleDistribution"></div>
        <div class="distribution-list" id="personaDistribution"></div>
        <div class="distribution-list" id="feasibilityDistribution"></div>
      </div>

      <div class="section">
        <h2>自由输入题</h2>
        <p class="subhead">展示最近填写的“自己真正想做什么方向”。</p>
        <div class="text-list" id="textAnswers"></div>
      </div>
    </section>

    <section class="section questions">
      <h2>每道题选项统计</h2>
      <p class="subhead">每张卡片显示该题各选项的选择人数和占比。</p>
      <div class="question-list" id="questionStats"></div>
    </section>
  </main>

  <script>
    const SITE_ID = "workplace-personality";
    const STATS_API_BASE = location.hostname === "personalitystats.kiraown.com"
      ? location.origin
      : "https://personalitystats.kiraown.com";

    const statusText = document.getElementById("statusText");
    const completionCount = document.getElementById("completionCount");
    const textCount = document.getElementById("textCount");
    const questionCount = document.getElementById("questionCount");
    const roleDistribution = document.getElementById("roleDistribution");
    const personaDistribution = document.getElementById("personaDistribution");
    const feasibilityDistribution = document.getElementById("feasibilityDistribution");
    const textAnswers = document.getElementById("textAnswers");
    const questionStats = document.getElementById("questionStats");

    document.getElementById("refreshBtn").addEventListener("click", loadSummary);

    async function loadSummary() {
      setStatus("正在读取...");
      try {
        const url = new URL(`${STATS_API_BASE.replace(/\/$/, "")}/api/summary`);
        url.searchParams.set("siteId", SITE_ID);
        const response = await fetch(url.toString(), { cache: "no-store" });
        if (!response.ok) throw new Error(`接口返回 ${response.status}`);
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || "接口返回异常");
        renderDashboard(data);
        setStatus(`已更新：${formatTime(data.updatedAt || new Date().toISOString())}`);
      } catch (error) {
        setStatus(`读取失败：${error.message}`, true);
      }
    }

    function renderDashboard(data) {
      completionCount.textContent = formatNumber(data.completions || 0);
      textCount.textContent = formatNumber(data.textAnswers?.filled || 0);
      questionCount.textContent = formatNumber((data.questionStats || []).length);

      roleDistribution.innerHTML = renderDistributionBlock("主推岗位", data.resultStats?.roles || [], "role");
      personaDistribution.innerHTML = renderDistributionBlock("职场人格", data.resultStats?.personas || [], "persona");
      feasibilityDistribution.innerHTML = renderDistributionBlock("AI 产品可行性", data.resultStats?.feasibility || [], "feasibility");
      textAnswers.innerHTML = renderTextAnswers(data.textAnswers?.recent || []);
      questionStats.innerHTML = renderQuestionStats(data.questionStats || []);
    }

    function renderDistributionBlock(title, items, tone) {
      const body = items.length
        ? items.map(item => renderDistributionItem(item, tone)).join("")
        : `<div class="empty">暂无${escapeHtml(title)}数据。</div>`;
      return `<div>
        <h3>${escapeHtml(title)}</h3>
        ${body}
      </div>`;
    }

    function renderDistributionItem(item, tone) {
      const percent = Number(item.percent || 0);
      return `<article class="distribution-card">
        <div class="card-title">
          <span>${escapeHtml(item.label || "未命名")}</span>
          <span>${formatNumber(item.count || 0)} 人 · ${percent}%</span>
        </div>
        <div class="bar-track"><div class="bar-fill ${tone}" style="width:${percent}%"></div></div>
      </article>`;
    }

    function renderTextAnswers(items) {
      if (!items.length) {
        return `<div class="empty">暂无自由输入内容。</div>`;
      }
      return items.map(item => `<article class="text-card">
        <p>${escapeHtml(item.text)}</p>
        <time>${formatTime(item.completedAt)}</time>
      </article>`).join("");
    }

    function renderQuestionStats(questions) {
      if (!questions.length) {
        return `<div class="empty">暂无题目统计。完成一次测评后，这里会出现每道题的选项数量。</div>`;
      }
      return questions.map(question => `<article class="question">
        <div class="question-head">
          <div class="question-number">${String(question.index || 0).padStart(2, "0")}</div>
          <h3>${escapeHtml(question.text || question.id)}</h3>
          <div class="question-total">${formatNumber(question.total || 0)} 次选择</div>
        </div>
        ${(question.options || []).map(renderQuestionOption).join("")}
      </article>`).join("");
    }

    function renderQuestionOption(option) {
      const percent = Number(option.percent || 0);
      return `<div class="option-row">
        <div>
          <div class="option-label">
            <span>${escapeHtml(option.label || option.value || "未命名选项")}</span>
            <span>${percent}%</span>
          </div>
          <div class="bar-track"><div class="bar-fill question-bar" style="width:${percent}%"></div></div>
        </div>
        <div class="option-count">${formatNumber(option.count || 0)} 人</div>
      </div>`;
    }

    function setStatus(text, isError = false) {
      statusText.textContent = text;
      statusText.classList.toggle("error", isError);
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString("zh-CN");
    }

    function formatTime(value) {
      if (!value) return "未知时间";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-CN", { hour12: false });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    loadSummary();
  </script>
</body>
</html>
